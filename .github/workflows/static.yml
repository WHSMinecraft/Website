# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build
        run: make

      - name: Fix absolute paths
        run: |
          REPO=${{ github.event.repository.name }}
          find ./webroot -name "*.html" -exec sed -i "s|href=\"/|href=\"/$REPO/|g" {} +
          find ./webroot -name "*.html" -exec sed -i "s|src=\"/|src=\"/$REPO/|g" {} +
          find ./webroot -name "*.css" -exec sed -i "s|url(/|url(/$REPO/|g" {} +
          find ./webroot -name "*.js" -exec sed -i "s|`/assets/block_textures/|`/$REPO/assets/block_textures/|g" {} +

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./webroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
