# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build
        run: make

      - name: Inject base tag # the original website lived under "/", but pages forces "/<repo-name>", breaking most links. So we inject this name into the HTML base tag.
        run: |
          find ./webroot -name "*.html" -exec sed -i 's|<head>|<head><base href="/Website/">|' {} +

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./webroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
